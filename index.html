<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Yoddha - Premium Stream</title>
  
  <!-- Fonts aur Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #00ff87; /* Modern Green accent */
      --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --card-bg: rgba(255, 255, 255, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-gradient);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    /* Header */
    header {
      padding: 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    header h1 {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff;
    }

    header h1 span {
      color: var(--primary-color);
    }

    /* Responsive Iframe Container (Universal Compatibility) */
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Ticker Box */
    .ticker-container {
      background: #000;
      padding: 12px;
      overflow: hidden;
      white-space: nowrap;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .ticker-text {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 20s linear infinite;
      color: var(--primary-color);
      font-weight: 700;
      font-size: 14px;
    }

    @keyframes marquee {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }

    /* Action Section */
    .content-area {
      padding: 20px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #00ff87, #60efff);
      color: #000;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 0.2s;
      box-shadow: 0 8px 20px rgba(0, 255, 135, 0.3);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header Area -->
    <header>
      <h1>CRICKET <span>YODDHA</span></h1>
    </header>

    <!-- Cross-Browser Supported Iframe Player -->
    <div class="video-wrapper">
      <iframe 
        id="player" 
        src="YOUR_STREAM_LINK_HERE" 
        allowfullscreen="true" 
        scrolling="no" 
        allow="autoplay; encrypted-media; picture-in-picture"
        playsinline>
      </iframe>
    </div>

    <!-- Scrolling Info Line -->
    <div class="ticker-container">
      <div class="ticker-text">
        ⚡ LIVE STREAM OPTIMIZED FOR ALL BROWSERS • ENJOY HIGH DEFINITION SMOOTH STREAMING VIA PREMIUM INFRASTRUCTURE • REFRESH IF VIDEO BUFFERS ⚡
      </div>
    </div>

    <!-- Actions Area -->
    <div class="content-area">
      <a href="https://t.me/+rwZKMV0-L8wyOTll" target="_blank" class="btn">
        <i class="material-icons">telegram</i> Join Telegram For Backup Links
      </a>
      
      <p class="footer-text">Optimized for iPhone, Android, Safari, and Chrome WebView.</p>
    </div>
  </div>

  <script>
    // Safari aur Mobile WebViews ke constraints ko bypass karne ke liye optimization logic
    document.addEventListener("DOMContentLoaded", () => {
      const iframe = document.getElementById('player');
      
      // Agar stream URL dynamically update karna ho toh aap is variable me URL badal sakte hain
      const secureStreamUrl = "YOUR_STREAM_LINK_HERE"; 
      
      if(secureStreamUrl !== "YOUR_STREAM_LINK_HERE" && secureStreamUrl !== "") {
        iframe.src = secureStreamUrl;
      }
    });
  </script>
</body>
  </html>
