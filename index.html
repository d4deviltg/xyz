<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jio Sports ADTV</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      min-height:100vh;
      background:#050505;
      color:#fff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top left,rgba(229,9,20,.32),transparent 35%),
        radial-gradient(circle at top right,rgba(0,102,255,.22),transparent 35%),
        linear-gradient(to bottom,#050505,#111 45%,#050505);
      z-index:-2;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      padding:16px;
      background:linear-gradient(to bottom,rgba(0,0,0,.92),rgba(0,0,0,.55),transparent);
      backdrop-filter:blur(10px);
    }

    .brand{
      font-size:28px;
      font-weight:900;
      color:#e50914;
      letter-spacing:.8px;
      text-transform:uppercase;
    }

    .hero{
      padding:34px 16px 26px;
    }

    .hero h1{
      font-size:36px;
      line-height:1.1;
      max-width:760px;
      font-weight:900;
      margin-bottom:12px;
    }

    .hero p{
      color:#ccc;
      font-size:15px;
      max-width:620px;
    }

    .search-wrap{
      padding:0 16px 20px;
    }

    .search-box{
      width:100%;
      max-width:560px;
      padding:15px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(20,20,20,.88);
      color:#fff;
      outline:none;
      font-size:15px;
      box-shadow:0 12px 30px rgba(0,0,0,.4);
    }

    .search-box:focus{
      border-color:#e50914;
      box-shadow:0 0 0 3px rgba(229,9,20,.22);
    }

    .section-title{
      padding:0 16px;
      font-size:20px;
      font-weight:800;
      margin-bottom:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
      gap:18px;
      padding:0 16px 40px;
    }

    .card{
      position:relative;
      min-height:210px;
      border-radius:18px;
      overflow:hidden;
      cursor:pointer;
      background:linear-gradient(145deg,#1c1c1c,#090909);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 40px rgba(0,0,0,.55);
      transition:.28s ease;
    }

    .card:hover{
      transform:scale(1.06) translateY(-6px);
      border-color:rgba(229,9,20,.8);
      box-shadow:0 22px 55px rgba(229,9,20,.25);
      z-index:5;
    }

    .poster{
      height:135px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at center,rgba(255,255,255,.14),transparent 55%),
        linear-gradient(135deg,#222,#050505);
    }

    .logo{
      width:82px;
      height:82px;
      object-fit:contain;
      border-radius:16px;
      background:#fff;
      padding:8px;
      box-shadow:0 10px 25px rgba(0,0,0,.45);
    }

    .fallback-logo{
      width:82px;
      height:82px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#e50914,#7b0006);
      font-size:30px;
      font-weight:900;
    }

    .content{
      padding:13px;
      background:linear-gradient(to top,#000,rgba(0,0,0,.88));
    }

    .name{
      font-size:14px;
      font-weight:800;
      line-height:1.25;
      min-height:35px;
    }

    .meta{
      margin-top:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-size:11px;
      color:#aaa;
    }

    .live{
      color:#fff;
      background:#e50914;
      padding:4px 7px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
      letter-spacing:.4px;
    }

    .watch{
      margin-top:10px;
      width:100%;
      border:none;
      border-radius:10px;
      padding:9px;
      color:#fff;
      background:#e50914;
      font-weight:800;
      cursor:pointer;
    }

    .error{
      grid-column:1/-1;
      text-align:center;
      margin-top:30px;
      color:#ff7777;
      font-size:17px;
    }

    @media(max-width:520px){
      .brand{font-size:23px}
      .hero h1{font-size:28px}
      .grid{
        grid-template-columns:repeat(2,1fr);
        gap:13px;
      }
      .card{min-height:200px}
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="brand">Star Sports By ADTV</div>
  </div>

  <section class="hero">
    <h1>Watch Live Sports Channels</h1>
    <p>Select your favourite channel and start watching instantly.</p>
  </section>

  <div class="search-wrap">
    <input id="searchInput" class="search-box" type="text" placeholder="Search channels..." />
  </div>

  <h2 class="section-title">Live Channels</h2>

  <div id="channelGrid" class="grid"></div>

<script>
  const JSON_URL = "https://binge-giotv.pages.dev/data/id.json";
  const PLAYER_PAGE = "player.html";

  const grid = document.getElementById("channelGrid");
  const searchInput = document.getElementById("searchInput");

  let allChannels = [];

  async function loadChannels(){
    try{
      const res = await fetch(JSON_URL);
      const data = await res.json();

      allChannels = data.channels || [];
      renderChannels(allChannels);
    }catch(e){
      console.error(e);
      grid.innerHTML = `<div class="error">Failed to load channels</div>`;
    }
  }

  function renderChannels(channels){
    grid.innerHTML = "";

    if(!channels.length){
      grid.innerHTML = `<div class="error">No channels found</div>`;
      return;
    }

    channels.forEach(channel=>{
      const card = document.createElement("div");
      card.className = "card";

      const logo = channel.logo || channel.image || channel.icon || "";
      const firstLetter = (channel.name || channel.id || "?").charAt(0).toUpperCase();

      card.innerHTML = `
        <div class="poster">
          ${
            logo
            ? `<img class="logo" src="${logo}" alt="${channel.name || channel.id}">`
            : `<div class="fallback-logo">${firstLetter}</div>`
          }
        </div>

        <div class="content">
          <div class="name">${channel.name || channel.id}</div>

          <div class="meta">
            <span>ID: ${channel.id}</span>
            <span class="live">LIVE</span>
          </div>

          <button class="watch">▶ Watch Now</button>
        </div>
      `;

      card.addEventListener("click",()=>{
        window.location.href = `${PLAYER_PAGE}?id=${encodeURIComponent(channel.id)}`;
      });

      grid.appendChild(card);
    });
  }

  searchInput.addEventListener("input",()=>{
    const q = searchInput.value.toLowerCase().trim();

    const filtered = allChannels.filter(channel =>
      (channel.name || "").toLowerCase().includes(q) ||
      (channel.id || "").toLowerCase().includes(q)
    );

    renderChannels(filtered);
  });

  loadChannels();
</script>

</body>
</html>
