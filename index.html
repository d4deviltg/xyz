<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cricket Yoddha - Premium Stream</title>
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #FFD700; /* Gold accent */
      --bg-gradient: linear-gradient(135deg, #050505, #111111, #1a1a1a);
      --card-bg: rgba(255, 255, 255, 0.03);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-gradient);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 30px 0;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 100%;
      background: transparent;
    }

    header {
      height: 70px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo-img {
      height: 50px;
      width: auto;
    }

    /* Responsive 16:9 Player */
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Ticker Box */
    .ticker-container {
      background: #0c0c0c;
      padding: 12px 0;
      overflow: hidden;
      white-space: nowrap;
      border-bottom: 1px solid rgba(255,215,0,0.1);
    }

    .ticker-text {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 25s linear infinite;
      color: var(--primary-color);
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
    }

    @keyframes marquee {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }

    /* Actions */
    .content-area {
      padding: 20px 15px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(180deg, #d32f2f, #8b0000); 
      color: #fff;
      border: 1px solid #ff5252;
      font-weight: 800;
      border-radius: 6px;
      font-size: 18px;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 0 #5e0000;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header>
      <img src="https://i.ibb.co/HLkW7zJV/ei-1765534270242-removebg-preview.png" alt="Logo" class="logo-img">
    </header>

    <!-- Cross-Browser Supported Player Container -->
    <div class="video-wrapper">
      <iframe 
        id="main-player" 
        src="about:blank" 
        allowfullscreen="true" 
        scrolling="no" 
        allow="autoplay; encrypted-media; picture-in-picture"
        playsinline>
      </iframe>
    </div>

    <!-- Ticker -->
    <div class="ticker-container">
      <div class="ticker-text">
        🏏 LIVE MATCH HD STREAMING • OPTIMIZED FOR ALL BROWSERS AND DEVICES • REFRESH IF VIDEO BUFFERS • JOIN TELEGRAM FOR INSTANT MATCH LINKS! ⚡
      </div>
    </div>

    <!-- Action Section -->
    <div class="content-area">
      <a href="https://t.me/+rwZKMV0-L8wyOTll" target="_blank" class="btn">
        JOIN TELEGRAM CHANNEL
      </a>
      
      <p class="footer-text">Universal Browser Engine V2 — iOS & Android Supported</p>
    </div>
  </div>

  <script>
    // GitHub JSON automatically link fetch karne ka secure tareeqa
    const JSON_URL = "https://raw.githubusercontent.com/manojmallah58-source/Cricket-yoddha-json/main/links.json";
    const CURRENT_CHANNEL_ID = "yoddha_prime_hindi"; 

    async function loadStream() {
      try {
        const response = await fetch(JSON_URL);
        if(!response.ok) throw new Error("GitHub File Not Found");
        
        const data = await response.json();
        if(data && data.channels && data.channels[CURRENT_CHANNEL_ID]) {
          // Direct player me link pass ho rha hai safely
          document.getElementById('main-player').src = data.channels[CURRENT_CHANNEL_ID];
        } else {
          console.error("Channel ID match nahi hui.");
        }
      } catch (e) { 
        console.error("Stream load karne me dikkat aayi:", e); 
      }
    }

    // Dom ready hote hi fast execution bina kisi crash ke
    document.addEventListener("DOMContentLoaded", () => {
      loadStream();
    });
  </script>
</body>
</html>
